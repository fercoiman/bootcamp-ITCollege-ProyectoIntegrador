<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ECommerce (inicio)</title>
    <link rel="stylesheet" href="css/estilos.css">
    <link rel="stylesheet" href="css/inicio.css">
</head>
<body>

    <header>
        <nav>
            <ul>
                <li> <a href="./index.html">Inicio</a> </li>
                <li> <a href="./alta.html">Alta</a> </li>
                <li> <a href="./carrito.html">Carrito</a> </li>
                <li> <a href="./contacto.html">Contacto</a> </li>
                <li> <a href="./nosotros.html">Nosotros</a> </li>
                <li> <a href="./otra.html">Otra</a> </li>
            </ul>
        </nav>
        <div>
            <div id="logo">Logo</div>
            <div id="barra-busqueda">
                <form action="">
                    <label for="buscar">Buscar</label>
                    <input type="text">
                    <input type="submit" value="Buscar">
                </form>
            </div>
            <div id="boton-carrito">C</div>
        </div>
    </header>

    <main>
        <div class="section-cards">
            <div class="section-cards-header">
                <h1>Listado de Productos</h1>
            </div>

            <!-- https://www.iconfinder.com/free_icons -->
            <div class="section-cards-body"></div>
        </div>
    </main>

    <footer>
        <h3>&copy; Copyright 2025</h3>
    </footer>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/handlebars.js/4.7.8/handlebars.min.js" integrity="sha512-E1dSFxg+wsfJ4HKjutk/WaCzK7S2wv1POn1RRPGh8ZK+ag9l244Vqxji3r6wgz9YBf6+vhQEYJZpSjqWFPg9gg==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script type="text/x-handlebars-template" id="plantilla-cards-productos">
        {{#if productos.length}}
            {{#each productos}}
                <section>
                    <h3>{{nombre}}</h3>
                    <img src="{{foto}}" alt="foto de {{nombre}} {{marca}}">
                    <p><b>Precio: </b>${{precio}}</p>
                    <p><b>Stock: </b>{{stock}}</p>
                    <p><b>Marca: </b>{{marca}}</p>
                    <p><b>Categoría: </b>{{categoria}}</p>
                    <p><b>Detalles: </b>{{detalles}}</p>
                    <br> 
                    <p><b style="color:gold;">Envío: </b>{{#if envio}}Si{{else}}No{{/if}}</p>
                </section> 
            {{/each}}
        {{else}}
            <h2>No se encontraron productos para mostrar</h2>
        {{/if}}
    </script>

    <script src="js/productos.js"></script>
    <script src="js/inicio.js"></script>
    <script src="js/main.js"></script>

</body>
</html>
