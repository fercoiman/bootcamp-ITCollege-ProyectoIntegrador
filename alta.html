<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ECommerce (alta)</title>
    <link rel="stylesheet" href="css/estilos.css">
    <link rel="stylesheet" href="css/alta.css">
</head>
<body>

    <header>
        <nav>
            <ul>
                <li> <a href="./index.html">Inicio</a> </li>
                <li> <a href="./alta.html">Alta</a> </li>
                <li> <a href="./carrito.html">Carrito</a> </li>
                <li> <a href="./contacto.html">Contacto</a> </li>
                <li> <a href="./nosotros.html">Nosotros</a> </li>
                <li> <a href="./otra.html">Otra</a> </li>
            </ul>
        </nav>
        <div>
            <div id="logo">Logo</div>
            <div id="barra-busqueda">
                <form action="">
                    <label for="buscar">Buscar</label>
                    <input type="text">
                    <input type="submit" value="Buscar">
                </form>
            </div>
            <div id="boton-carrito">C</div>
        </div>
    </header>

    <main>
        <h1>Alta de Productos</h1>

        <form action="#" class="alta-form">
            <!-- campo nombre -->
            <div class="input-group">
                <label for="nombre">nombre</label>
                <input id="nombre" type="text" name="nombre">
                <div class="error-detail"></div>
            </div>

            <!-- campo precio -->
            <div class="input-group">
                <label for="precio">precio</label>
                <input id="precio" type="number" name="precio">
                <div class="error-detail"></div>
            </div>

            <!-- campo stock -->
            <div class="input-group">
                <label for="stock">stock</label>
                <input id="stock" type="number" name="stock">
                <div class="error-detail"></div>
            </div>

            <!-- campo marca -->
            <div class="input-group">
                <label for="marca">marca</label>
                <input id="marca" type="text" name="marca">
                <div class="error-detail"></div>
            </div>

            <!-- campo categoria -->
            <div class="input-group">
                <label for="categoria">categoría</label>
                <input id="categoria" type="text" name="categoria">
                <div class="error-detail"></div>
            </div>

            <!-- campo detalles -->
            <div class="input-group">
                <label for="detalles">detalles</label>
                <input id="detalles" type="text" name="detalles">
                <div class="error-detail"></div>
            </div>

            <!-- campo foto -->
            <div class="input-group">
                <label for="foto">foto</label>
                <input id="foto" type="text" name="foto">
                <div class="error-detail"></div>
            </div>

            <!-- campo envío -->
            <div class="input-group">
                <input id="envio" type="checkbox" name="envio">
                <label for="envio">envío</label>
            </div>

            <button onclick="agregar(event)">Agregar</button>
        </form>

        <hr>

        <h2>Lista de productos disponibles</h2>

        <table></table>
        
    </main>

    <footer>
        <h3>&copy; Copyright 2025</h3>
    </footer>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/handlebars.js/4.7.8/handlebars.min.js" integrity="sha512-E1dSFxg+wsfJ4HKjutk/WaCzK7S2wv1POn1RRPGh8ZK+ag9l244Vqxji3r6wgz9YBf6+vhQEYJZpSjqWFPg9gg==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script type="text/x-handlebars-template" id="plantilla-tabla-productos">
        {{#if productos.length}}
            <tr>
                <th>nombre</th>
                <th>precio</th>
                <th>stock</th>
                <th>marca</th>
                <th>categoría</th>
                <th>detalles</th>
                <th>foto</th>
                <th>envío</th>
            </tr>
            {{#each productos}}
                <tr>
                    <td>{{nombre}}</td>
                    <td class="centrar">${{precio}}</td>
                    <td class="centrar">{{stock}}</td>
                    <td>{{marca}}</td>
                    <td>{{categoria}}</td>
                    <td>{{detalles}}</td>
                    <td><img width="75" src="{{foto}}" alt="foto de {{nombre}} {{marca}}"></td>
                    <td class="centrar">{{#if envio}}Si{{else}}No{{/if}}</td>
                </tr>            
            {{/each}}
        {{else}}
            <h2>No se encontraron productos para mostrar</h2>
        {{/if}}
    </script>

    <script src="js/productos.js"></script>
    <script src="js/alta.js"></script>
    <script src="js/main.js"></script>

</body>
</html>
